<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- OPEN GRAPH TAGS (what iMessage shows) -->
    <!-- Replace {{PUBLIC_URL}} with your hosted URL, e.g., https://rickroll.example.com/jam.html -->
    <!-- Replace {{IMAGE_URL}} with absolute HTTPS image URL (1200x630px minimum, <5MB) -->
    
    <meta property="og:title" content="Join my Jam">
    <meta property="og:description" content="Listen together in real time on Spotify">
    <meta property="og:image" content="https://rickroll-jam.jacob-t-brondum.workers.dev/preview.png">
    <meta property="og:url" content="https://open.spotify.com/playlist/jamming">
    <meta property="og:type" content="music.playlist">
    
    <!-- TWITTER CARD (fallback for some apps) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Join my Jam">
    <meta name="twitter:description" content="Listen together in real time on Spotify">
    <meta name="twitter:image" content="https://rickroll-jam.jacob-t-brondum.workers.dev/preview.png">
    
    <!-- REDIRECT: instant on load -->
    <meta http-equiv="refresh" content="0;url=https://www.youtube.com/watch?v=dQw4w9WgXcQ">
    
    <title>Opening Jam…</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #121212;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
        }
        .spinner {
            width: 48px;
            height: 48px;
            margin: 0 auto 20px;
            border: 3px solid #1DB954;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        p {
            font-size: 16px;
            color: #b3b3b3;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <p>Opening Jam…</p>
    </div>

    <!-- REDIRECT: JS fallback if meta refresh is blocked -->
    <script>
        window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
    </script>
</body>
</html>
